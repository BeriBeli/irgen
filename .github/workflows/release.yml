name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify Tag Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Verify tag matches Cargo.toml version
        run: |
          python - <<'PY'
          import os
          import tomllib
          with open("Cargo.toml", "rb") as f:
              data = tomllib.load(f)
          version = data["workspace"]["package"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag {tag} does not match Cargo.toml version {expected}")
          print(f"Tag matches version: {tag}")
          PY

  build:
    name: Build (${{ matrix.package }})
    runs-on: ${{ matrix.os }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: linux
            arch: x86_64
            package: linux-x86_64-glibc
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            system: linux
            arch: x86_64
            package: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            system: macos
            arch: arm64
            package: macos-arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            system: windows
            arch: x86_64
            package: windows-x86_64
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install xmllint
        if: runner.os == 'Linux'
        run: command -v xmllint || (sudo apt-get update && sudo apt-get install -y libxml2-utils)
      - name: Test
        run: cargo test --workspace --locked
      - name: Build CLI
        run: cargo build --release --locked --bin irgen --target ${{ matrix.target }}
      - name: Package Unix CLI
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/irgen" dist/irgen
          chmod +x dist/irgen
          tar -C dist -czf "dist/irgen-${GITHUB_REF_NAME}-${{ matrix.package }}.tar.gz" irgen
      - name: Package Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\irgen.exe" dist\irgen.exe
          $artifact = "irgen-${env:GITHUB_REF_NAME}-${{ matrix.package }}.zip"
          Compress-Archive -Path dist\irgen.exe -DestinationPath "dist\$artifact"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-${{ matrix.package }}
          path: dist/irgen-*

  release:
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/**/irgen-*
            snapsheet.toml
            examples/*.xlsx
            examples/*.xlsm
            examples/*.ods
