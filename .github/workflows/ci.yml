name: CI

on:
  push:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/*.xlsx"
      - "**/*.xlsm"
      - "**/*.xls"
      - "**/*.xlsb"
      - "**/*.ods"
      - "**/*.xsd"
      - "**/*.py"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/*.xlsx"
      - "**/*.xlsm"
      - "**/*.xls"
      - "**/*.xlsb"
      - "**/*.ods"
      - "**/*.xsd"
      - "**/*.py"
      - ".github/workflows/*.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Test
        run: cargo test --workspace --locked
      - name: Build CLI
        run: cargo build --release --locked --bin irgen
      - name: Smoke test IP-XACT conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example_simple.xlsx -o target/irgen-simple.xml
      - name: Smoke test RALF conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example_simple.xlsx --format ralf -o target/irgen-simple.ralf
      - name: Smoke test SystemRDL conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example_simple.xlsx --format systemrdl -o target/irgen-simple.rdl
      - name: Smoke test XLSM snapsheet conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example_simple.xlsm -o target/irgen-simple-xlsm.xml
      - name: Smoke test ODS snapsheet conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example_simple.ods -o target/irgen-simple-ods.xml
      - name: Smoke test configured snapsheet IP-XACT conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example.xlsx --config snapsheet.toml -o target/irgen-configured-example.xml
      - name: Smoke test configured snapsheet RALF conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example.xlsx --config snapsheet.toml --format ralf -o target/irgen-configured-example.ralf
      - name: Smoke test configured snapsheet SystemRDL conversion
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example.xlsx --config snapsheet.toml --format systemrdl -o target/irgen-configured-example.rdl
      - uses: actions/setup-python@v6.2.0
        if: runner.os == 'Linux'
        with:
          python-version: "3.12"
      - name: Install SystemRDL compiler
        if: runner.os == 'Linux'
        run: python -m pip install --upgrade pip systemrdl-compiler==1.32.2
      - name: Validate SystemRDL output
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          from pathlib import Path
          from systemrdl import RDLCompiler

          for path in [
              Path("target/irgen-simple.rdl"),
              Path("target/irgen-configured-example.rdl"),
          ]:
              rdlc = RDLCompiler()
              rdlc.compile_file(str(path))
              rdlc.elaborate()
              print(f"Validated SystemRDL: {path}")
          PY
      - name: Install xmllint
        if: runner.os == 'Linux'
        run: command -v xmllint || (sudo apt-get update && sudo apt-get install -y libxml2-utils)
      - name: Validate ip-xact XML serializers
        if: runner.os == 'Linux'
        run: cargo test --locked -p irgen-ip-xact --test ipxact_xml
      - name: Validate IP-XACT against official XSD
        if: runner.os == 'Linux'
        run: cargo run --locked -p irgen-cli -- snapsheet examples/example.xlsx --config snapsheet.toml --standard ieee-1685-2022 -o target/irgen-configured-example.xml --validate crates/ipxact/schema/1685-2022/index.xsd
