name: CI

on:
  push:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/*.xlsx"
      - "**/*.xsd"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/*.xlsx"
      - "**/*.xsd"
      - ".github/workflows/*.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace --locked
      - name: Build CLI
        run: cargo build --release --locked --bin irgen
      - name: Smoke test IP-XACT conversion
        run: cargo run --locked -p irgen-cli -- example_simple.xlsx -o target/irgen-simple.xml
      - name: Smoke test RALF conversion
        run: cargo run --locked -p irgen-cli -- example_simple.xlsx --format ralf -o target/irgen-simple.ralf
      - name: Smoke test SystemRDL conversion
        run: cargo run --locked -p irgen-cli -- example_simple.xlsx --format systemrdl -o target/irgen-simple.rdl
      - name: Smoke test configured snapsheet IP-XACT conversion
        run: cargo run --locked -p irgen-cli -- example.xlsx --snapsheet-spec snapsheet.toml -o target/irgen-configured-example.xml
      - name: Smoke test configured snapsheet RALF conversion
        run: cargo run --locked -p irgen-cli -- example.xlsx --snapsheet-spec snapsheet.toml --format ralf -o target/irgen-configured-example.ralf
      - name: Smoke test configured snapsheet SystemRDL conversion
        run: cargo run --locked -p irgen-cli -- example.xlsx --snapsheet-spec snapsheet.toml --format systemrdl -o target/irgen-configured-example.rdl
      - name: Install xmllint
        if: runner.os == 'Linux'
        run: command -v xmllint || (sudo apt-get update && sudo apt-get install -y libxml2-utils)
      - name: Validate ip-xact IEEE 1685-2014 models
        if: runner.os == 'Linux'
        run: cargo test --locked -p ip-xact --test v2014_test
      - name: Validate IP-XACT against official XSD
        if: runner.os == 'Linux'
        run: cargo run --locked -p irgen-cli -- example.xlsx --snapsheet-spec snapsheet.toml -o target/irgen-configured-example.xml --validate crates/model/tests/fixtures/ipxact-1685-2014/index.xsd
